<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System with CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }
        #solar-system {
            position: relative;
            width: 400px;
            height: 400px;
            transform-style: preserve-3d;
            animation: rotate-solar-system 30s infinite linear;
        }
        #sun {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            background-color: yellow;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 50px rgba(255, 255, 0, 0.5);
        }
        .orbit {
            position: absolute;
            height: 100%;
            transform-origin: 50% 50%;
            animation: orbit 30s infinite linear;
        }
        #orbit-venus {
            transform: translate(-50%, -50%) rotate(0deg);
            animation-duration: 6s;
        }
        #orbit-earth {
            transform: translate(-50%, -50%) rotate(0deg);
            animation-duration: 10s;
        }
        #orbit-mars {
            transform: translate(-50%, -50%) rotate(0deg);
            animation-duration: 15s;
        }
        .planet {
            position: absolute;
            top: 0;
            left: 50%;
            width: 30px;
            height: 30px;
            background-color: #aaa;
            border-radius: 50%;
        }
        #mercury {
            background-color: #8a8a8a;
            width: 10px;
            height: 10px;
        }
        #venus {
            background-color: #f1a400;
            width: 18px;
            height: 18px;
        }
        #earth {
            background-color: #3b74d7;
            width: 22px;
            height: 22px;
        }
        #mars {
            background-color: #d84b47;
            width: 24px;
            height: 24px;
        }
        @keyframes rotate-solar-system {
            from {transform: rotateY(0deg);}
            to {transform: rotateY(360deg);}
        }
        @keyframes orbit {
            from {transform: rotate(0deg);}
            to {transform: rotate(360deg);}
        }
    </style>
</head>
<body>
    <div id="solar-system">
        
        <div id="sun"></div>
        
        <div class="orbit" id="orbit-mercury">
            <div class="planet" id="mercury"></div>
        </div>
        
        <div class="orbit" id="orbit-venus">
            <div class="planet" id="venus"></div>
        </div>

        <div class="orbit" id="orbit-earth">
            <div class="planet" id="earth"></div>
        </div>

        <div class="orbit" id="orbit-mars">
            <div class="planet" id="mars"></div>
        </div>
    </div>
</body>
</html>
